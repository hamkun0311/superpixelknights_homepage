<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Super Pixel Knights</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <style>
        body { background-color: #1a1a1a; color: #fff; font-family: 'Press Start 2P', cursive; margin: 0; padding-top: 80px; }

        /* 1. 상단 네비게이션 바 */
        .navbar {
            position: fixed; top: 0; width: 100%; background: #333;
            border-bottom: 4px solid #555; display: flex; align-items: center;
            padding: 15px 20px; z-index: 1000; box-sizing: border-box;
        }
        .nav-logo { color: #ffcc00; text-decoration: none; font-size: 14px; margin-right: 30px; }
        /* 상단 로고 이미지 스타일 보정 */
        .nav-logo img {
            display: block; /* 주변 텍스트 영향 방지 */
            height: 35px;   /* 상단 바 높이에 맞춰 조절 (이미지 크기에 따라 30~40px 추천) */
            width: auto;    /* 비율 유지 */
        }
        .nav-menu { display: flex; gap: 20px; list-style: none; margin: 0; padding: 0; }
        .nav-item { position: relative; cursor: pointer; font-size: 10px; }
        .nav-item a { color: #fff; text-decoration: none; }
        .dropdown {
            display: none; position: absolute; top: 100%; left: 0;
            background: #2a2a2a; border: 3px solid #555; padding: 10px;
            min-width: 180px; box-shadow: 4px 4px 0px #000;
        }
        .nav-item:hover .dropdown { display: block; }
        .dropdown a { display: block; padding: 10px 0; color: #aaa; text-decoration: none; }
        .dropdown a:hover { color: #ffcc00; }

        /* 2. 메인 컨텐츠 영역 */
        .container { max-width: 800px; margin: auto; text-align: center; padding: 20px; box-sizing: border-box; }

        /* 게임 로고 이미지 */
        .game-logo { width: 100%; max-width: 300px; margin-bottom: 30px; }

        /* 게임 스크린샷 이미지 */
        .game-screenshot {
            width: 100%; max-width: 600px; border: 4px solid #555;
            box-shadow: 8px 8px 0px #000; margin-bottom: 40px;
        }

        /* 3. CSS로 만든 구글 다운로드 버튼 */
        .btn-google-play {
            display: inline-block; padding: 18px 25px;
            background-color: #000; color: #fff;
            text-decoration: none; font-size: 12px;
            border: 4px solid #555; box-shadow: 6px 6px 0px #000;
            cursor: pointer; position: relative;
        }
        .btn-google-play:hover { background-color: #222; transform: translate(-2px, -2px); box-shadow: 8px 8px 0px #000; }
        .btn-google-play:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px #000; }

        /* 버튼 내 아이콘 느낌 */
        .play-icon { color: #3bccff; margin-right: 10px; }

        /* 모바일 대응 */
        @media (max-width: 600px) {
            .navbar { padding: 10px; }
            .nav-logo { font-size: 12px; margin-right: 15px; }
            .nav-item { font-size: 8px; }
            .dropdown { min-width: 150px; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="/" class="nav-logo">
        <img src="/images/logo.png" alt="SPK Logo" style="height: 30px; vertical-align: middle;" />
    </a>
    <ul class="nav-menu">
        <li class="nav-item"><a href="/">Intro</a></li>
        <li class="nav-item">
            Help
            <div class="dropdown">
                <a href="/reportWrite">Bug & report</a>
                <a href="/privacy">Privacy policy</a>
            </div>
        </li>
    </ul>
</nav>

<div class="container hero">
    <img src="/images/logo.png" alt="Super Pixel Knights Logo" class="game-logo" />

    <h1>Welcome, Knight!</h1>
    <p>The ultimate retro adventure awaits you.</p>

    <img th:src="@{/images/screenshot1.png}" alt="Game Screenshot" class="game-screenshot" />

    <br /><br />

    <a href="https://play.google.com/store/apps/details?id=com.oestewdio.superpixelknights" class="btn-google-play">
        <span class="play-icon">▶</span> GET IT ON Google Play
    </a>
</div>
</body>
</html>
