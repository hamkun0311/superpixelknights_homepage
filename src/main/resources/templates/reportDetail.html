<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPK - Report Detail</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a1a; color: #ffffff;
            font-family: 'Press Start 2P', cursive; font-size: 10px;
            display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0;
        }
        .container {
            width: 100%; max-width: 600px; border: 4px solid #555;
            padding: 25px; background-color: #2a2a2a;
            box-shadow: 8px 8px 0px #000; box-sizing: border-box; margin-top: 20px;
        }
        h2 { color: #ffcc00; text-align: center; margin-bottom: 25px; font-size: 14px; }
        h3 { color: #00ff00; font-size: 10px; border-bottom: 2px solid #444; padding-bottom: 10px; margin-top: 30px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; color: #aaa; line-height: 1.5; }
        label span { color: #fff; }

        /* 본문 내용 상자 */
        .readonly-box {
            width: 100%; min-height: 100px; border: 3px solid #555; background: #000;
            color: #eee; padding: 15px; box-sizing: border-box;
            font-size: 11px; line-height: 1.8; white-space: pre-wrap;
        }

        /* 댓글 영역 스타일 */
        .comments-section { margin-top: 30px; }
        .comment-item {
            background: #333; border-left: 4px solid #00ff00;
            padding: 15px; margin-bottom: 15px; position: relative;
        }
        .comment-author { color: #00ff00; font-size: 8px; margin-right: 10px; }
        .comment-date { color: #666; font-size: 7px; }
        .comment-item p { margin-top: 10px; font-size: 10px; color: #fff; line-height: 1.6; }

        /* 관리자 답글 폼 */
        .admin-reply { margin-top: 30px; padding-top: 20px; border-top: 2px dashed #444; }
        textarea {
            width: 100%; border: 3px solid #555; background: #000;
            color: #fff; padding: 12px; box-sizing: border-box;
            font-family: inherit; font-size: 11px; margin-bottom: 10px;
            resize: vertical;
        }
        .btn-save {
            width: 100%; padding: 15px; background-color: #008800;
            color: white; border: none; cursor: pointer;
            box-shadow: 4px 4px 0px #004400; font-family: inherit; font-size: 10px;
        }
        .btn-save:hover { background-color: #00aa00; }
        .btn-save:active { transform: translate(2px, 2px); box-shadow: none; }

        .btn-back {
            display: inline-block; margin-top: 20px; color: #888;
            text-decoration: none; font-size: 8px;
        }
        .btn-back:hover { color: #fff; }

        @media (max-width: 480px) {
            .container { padding: 15px; }
            h2 { font-size: 12px; }
        }
    </style>
</head>
<body>
<div th:replace="~{common/header :: headerFragment}"></div>

<div class="container">
    <h2>[ REPORT DETAIL ]</h2>

    <div class="form-group">
        <label>TITLE: <span th:text="${inquiry.title}"></span></label>
        <div class="readonly-box" th:text="${inquiry.content}"></div>
    </div>

    <div class="comments-section" th:if="${not #lists.isEmpty(inquiry.comments)}">
        <h3>[ ANSWERS ]</h3>
        <div th:each="comment : ${inquiry.comments}" class="comment-item">
            <span class="comment-author" th:text="${comment.nickname}"></span>
            <span class="comment-date" th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
            <p th:text="${comment.content}"></p>
        </div>
    </div>

    <div th:if="${isAdmin}" class="admin-reply">
        <form action="/commentSave" method="post">
            <input type="hidden" name="inquiryId" th:value="${inquiry.id}">
            <textarea name="content" rows="4" placeholder="답변을 입력하세요..."></textarea>
            <button type="submit" class="btn-save">SAVE ANSWER</button>
        </form>
    </div>

    <a href="/reportList" class="btn-back">< BACK TO LIST</a>
</div>
</body>
</html>
