<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPK - Bug Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a1a; color: #ffffff;
            font-family: 'Press Start 2P', cursive; font-size: 10px;
            display: flex; flex-direction: column; align-items: center; padding: 15px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 500px;
            border: 4px solid #555;
            padding: 20px;
            background-color: #2a2a2a;
            box-shadow: 6px 6px 0px #000;
            box-sizing: border-box;
            margin-top: 20px;
        }
        h2 {
            color: #ffcc00; text-align: center; margin-bottom: 25px;
            line-height: 1.5; font-size: 14px; text-shadow: 2px 2px 0px #000;
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; color: #aaa; }

        input, textarea, select {
            width: 100%; border: 3px solid #555; background: #000;
            color: #fff; padding: 12px; box-sizing: border-box;
            font-family: inherit; font-size: 11px;
            border-radius: 0;
        }
        .readonly { color: #00ff00; border-color: #006600; }

        /* 메인 전송 버튼 */
        .btn-send {
            width: 100%; padding: 18px; background-color: #ff4444;
            color: white; border: none; cursor: pointer;
            box-shadow: 4px 4px 0px #880000; font-family: inherit;
            font-size: 12px; margin-top: 10px;
            -webkit-appearance: none;
        }
        .btn-send:hover { background-color: #ff6666; transform: translate(-1px, -1px); }
        .btn-send:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px #880000; }

        /* 목록 이동 버튼 (추가됨) */
        .btn-list {
            display: block; width: 100%; padding: 15px;
            background-color: #444; color: #fff; text-decoration: none;
            text-align: center; border: 3px solid #666;
            box-shadow: 4px 4px 0px #000; font-family: inherit;
            font-size: 10px; margin-top: 20px; box-sizing: border-box;
        }
        .btn-list:hover { background-color: #555; color: #ffcc00; }
        .btn-list:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px #000; }

        /* 상단바 여백 확보 */
        body { padding-top: 80px !important; }

        @media (max-width: 360px) {
            body { padding: 10px; }
            .container { padding: 15px; border-width: 3px; }
            h2 { font-size: 12px; }
        }
    </style>
</head>
<body>
<div th:replace="~{common/header :: headerFragment}"></div>

<div class="container">
    <h2>[ BUG REPORT ]</h2>
    <form action="/reportSave" method="post">
        <div class="form-group">
            <label>HERO NICKNAME</label>
            <input type="text" name="nickname" th:value="${inquiry.nickname}" class="readonly" readonly>
        </div>
        <div class="form-group">
            <label>CATEGORY</label>
            <select name="category">
                <option value="BUG">QUEST BUG</option>
                <option value="GRAPHIC">GRAPHIC ERROR</option>
                <option value="FEEDBACK">SUGGESTION</option>
                <option value="OTHER">OTHERS</option>
            </select>
        </div>
        <div class="form-group">
            <label>TITLE</label>
            <input type="text" name="title" placeholder="Enter title..." required>
        </div>
        <div class="form-group">
            <label>MESSAGE</label>
            <textarea name="content" rows="6" placeholder="Describe your bug. After verifying the bug, we will compensate you with 5000 gold." required></textarea>
        </div>
        <button type="submit" class="btn-send">SEND REPORT</button>
    </form>

    <a href="/reportList" class="btn-list">[ VIEW MY LOGS ]</a>
</div>
</body>
</html>
