<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPK - Bug Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a1a; color: #ffffff;
            font-family: 'Press Start 2P', cursive; font-size: 10px; /* 모바일 대응 폰트 크기 하향 */
            display: flex; justify-content: center; padding: 15px;
            margin: 0; /* 기본 여백 제거 */
        }
        .container {
            width: 100%;
            max-width: 500px;
            border: 4px solid #555;
            padding: 20px;
            background-color: #2a2a2a;
            box-shadow: 6px 6px 0px #000; /* 그림자 살짝 축소 */
            box-sizing: border-box; /* 패딩이 너비를 넘지 않게 고정 */
        }
        h2 {
            color: #ffcc00; text-align: center; margin-bottom: 25px;
            line-height: 1.5; font-size: 14px;
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; color: #aaa; }

        /* 입력창 터치 영역 강화 */
        input, textarea, select {
            width: 100%; border: 3px solid #555; background: #000;
            color: #fff; padding: 12px; box-sizing: border-box;
            font-family: inherit; font-size: 12px; /* 모바일 입력 시 시인성 확보 */
            border-radius: 0; /* 아이폰 등에서 둥글게 변하는 것 방지 */
        }
        .readonly { color: #00ff00; border-color: #006600; }

        /* 버튼 터치 최적화 */
        button {
            width: 100%; padding: 18px; background-color: #ff4444;
            color: white; border: none; cursor: pointer;
            box-shadow: 4px 4px 0px #880000; font-family: inherit;
            font-size: 12px; margin-top: 10px;
            -webkit-appearance: none; /* 모바일 브라우저 기본 스타일 제거 */
        }

        button:hover { background-color: #ff6666; transform: translate(-1px, -1px); }
        button:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px #880000; }

        /* 화면이 아주 작은 폰 대응 (아이폰 SE 등) */
        @media (max-width: 360px) {
            body { padding: 10px; }
            .container { padding: 15px; border-width: 3px; }
            h2 { font-size: 12px; }
        }
    </style>
</head>
<body>
<div th:replace="~{common/header :: headerFragment}"></div>
<div class="container">
    <h2>[ BUG REPORT ]</h2>
    <form action="/reportSave" method="post">
        <div class="form-group">
            <label>HERO NICKNAME</label>
            <input type="text" name="nickname" th:value="${inquiry.nickname}" class="readonly" readonly>
        </div>
        <div class="form-group">
            <label>CATEGORY</label>
            <select name="category">
                <option value="BUG">QUEST BUG</option>
                <option value="GRAPHIC">GRAPHIC ERROR</option>
                <option value="FEEDBACK">SUGGESTION</option>
                <option value="OTHER">OTHERS</option>
            </select>
        </div>
        <div class="form-group">
            <label>TITLE</label>
            <input type="text" name="title" placeholder="Enter title..." required>
        </div>
        <div class="form-group">
            <label>MESSAGE</label>
            <textarea name="content" rows="6" placeholder="Describe your bug. After verifying the bug, we will compensate you with 5000 gold." required></textarea>
        </div>
        <button type="submit">SEND REPORT</button>
    </form>
</div>
</body>
</html>
