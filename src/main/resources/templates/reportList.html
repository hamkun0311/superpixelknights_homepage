<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPK - Quest Logs</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a1a; color: #fff;
            font-family: 'Press Start 2P', cursive; font-size: 9px;
            padding: 15px; margin: 0;
            display: flex; flex-direction: column; align-items: center;
        }
        h2 { color: #ffcc00; text-align: center; margin-bottom: 20px; font-size: 14px; text-shadow: 4px 4px 0px #000; }

        /* 테이블 모바일 최적화 */
        .table-container { width: 100%; max-width: 600px; overflow-x: auto; margin-top: 20px; }
        table {
            width: 100%; border-collapse: collapse; border: 3px solid #555;
            background-color: #2a2a2a; box-shadow: 6px 6px 0px #000;
        }
        th, td {
            padding: 12px 8px; border: 2px solid #333; text-align: center;
            word-break: break-all;
        }
        th { background-color: #333; color: #ffcc00; font-size: 8px; }
        tr:nth-child(even) { background-color: #222; }

        /* 제목 링크 스타일: 픽셀 아트 감성 유지 */
        .title-link {
            color: #fff; text-decoration: none; border-bottom: 1px dashed #666;
            display: inline-block; padding-bottom: 2px;
        }
        .title-link:hover { color: #ffcc00; border-bottom: 1px solid #ffcc00; }

        /* 상태별 색상 (PENDING -> WAIT, ANSWERED -> OK) */
        .status-pending { color: #ff4444; }
        .status-done { color: #00ff00; }

        /* 하단 버튼 스타일 */
        .btn-write {
            display: block; width: 100%; max-width: 240px;
            margin-top: 30px; padding: 15px;
            background-color: #ff4444; color: #fff;
            text-decoration: none; text-align: center;
            border: 3px solid #880000; box-shadow: 4px 4px 0px #000;
            font-size: 10px;
        }
        .btn-write:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px #000; }

        body { padding-top: 80px !important; }
    </style>
</head>
<body>
<div th:replace="~{common/header :: headerFragment}"></div>

<h2>[ QUEST LOGS ]</h2>

<div class="table-container">
    <table>
        <thead>
        <tr>
            <th style="width: 10%;">ID</th>
            <th style="width: 25%;">HERO</th>
            <th style="width: 45%;">TITLE</th>
            <th style="width: 20%;">ST</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${inquiries}">
            <td th:text="${item.id}"></td>
            <td th:text="${item.nickname}"></td>
            <td>
                <a th:href="@{/reportDetail/{id}(id=${item.id})}"
                   class="title-link"
                   th:text="${item.title}"></a>
            </td>
            <td th:class="${item.status == 'ANSWERED' ? 'status-done' : 'status-pending'}"
                th:text="${item.status == 'ANSWERED' ? 'OK' : 'WAIT'}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(inquiries)}">
            <td colspan="4" style="padding: 40px 0; color: #666;">No logs found.</td>
        </tr>
        </tbody>
    </table>
</div>

<a href="/reportWrite" class="btn-write">NEW REPORT</a>
</body>
</html>
