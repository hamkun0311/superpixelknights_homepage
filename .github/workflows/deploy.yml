name: Build and Deploy to Mac Mini

on:
  push:
    branches: [ main ]  # main 브랜치에 push(merge)될 때 실행

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew bootJar

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/superpixelknights_homepage:latest

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Pull and Restart
        run: |
          # 1. docker-compose.yml 파일이 있는 절대 경로로 이동
          cd ~/project/2025/superpixelknights
          
          # 2. 최신 이미지 내려받기
          docker-compose pull
          
          # 3. 파일 위치를 명시하여 실행 (파일을 못 찾을 경우를 대비)
          docker-compose -f docker-compose.yml up -d
          
          # 4. 안 쓰는 이미지 정리
          docker image prune -f