name: Build and Deploy to Mac Mini

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew bootJar

      # [추가] 멀티 플랫폼 빌드를 위한 에뮬레이터 설정
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      # [추가] 멀티 플랫폼 빌드를 지원하는 Buildx 엔진 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          # [핵심 변경] 맥 미니(arm64)와 일반 서버(amd64) 모두 지원하도록 빌드
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/superpixelknights_homepage:latest

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Pull and Restart
        run: |
          cd ~/project/2025/superpixelknights
          
          # [선택 사항] 맥 미니의 로컬 소스코드도 최신화하고 싶다면 주석 해제하세요.
          # git pull origin main
          
          docker-compose pull
          docker-compose -f docker-compose.yml up -d
          docker image prune -f