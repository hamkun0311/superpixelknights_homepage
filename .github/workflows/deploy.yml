name: Build and Deploy to Mac Mini

on:
  push:
    branches: [ main ]  # main 브랜치에 push(merge)될 때 실행

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew bootJar

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/superpixelknights_homepage:latest

  deploy:
    needs: build-and-push
    runs-on: self-hosted  # 맥 미니에 설치한 Runner에서 실행
    steps:
      - name: Pull latest image and Restart
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/superpixelknights_homepage:latest
          docker-compose up -d
          docker image prune -f  # 오래된 이미지 삭제